<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>온기가득 남산 이츠</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; }
    .food-image-option {
      display:flex; align-items:center; justify-content:center;
      padding:10px; border-radius:12px; border:2px solid transparent;
      cursor:pointer; transition:all 0.2s; background:#F9FAFB; position:relative;
    }
    .food-image-option:hover { background:#E0E7FF; transform:scale(1.05); }
    .food-image-option.selected {
      border-color:#4F46E5; background:#EDE9FE; transform:scale(1.08);
      box-shadow:0 0 0 3px rgba(79,70,229,0.2);
    }
    .food-image-option.selected::after {
      content:'✓'; position:absolute; top:-6px; right:-6px;
      background:#4F46E5; color:white; border-radius:50%;
      width:18px; height:18px; font-size:11px; line-height:18px; text-align:center;
    }
    .star-btn {
      font-size:28px; cursor:pointer; background:none; border:none;
      padding:4px; filter:grayscale(1) opacity(0.35);
      transition:filter 0.15s, transform 0.15s; line-height:1;
    }
    #notification { transition:transform 0.4s cubic-bezier(0.68,-0.55,0.265,1.55); }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">

<!-- 알림 팝업 -->
<div id="notification" class="fixed top-4 right-4 bg-white rounded-lg shadow-lg p-4 border-l-4 border-blue-400 z-50" style="transform:translateX(500px)">
  <div class="flex items-center">
    <i class="fas fa-bell text-blue-500 mr-3"></i>
    <p id="notification-text" class="text-gray-800 font-medium"></p>
  </div>
</div>

<!-- 헤더 -->
<header class="bg-white shadow-sm border-b border-blue-100">
  <div class="container mx-auto px-4 py-4">
    <div class="flex items-center justify-between flex-wrap gap-3">
      <div class="flex items-center space-x-3">
        <i class="fas fa-motorcycle text-2xl" style="color:#f6552f"></i>
        <h1 class="text-2xl font-bold">
          <span style="color:#935227">온기가득</span>
          <span style="color:#f6552f">nam</span><span style="color:#ffb700">san</span>
          <span style="color:#88cc2f">eats</span>
        </h1>
      </div>
      <nav class="flex space-x-3">
        <button onclick="showDashboard()" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors text-sm">
          <i class="fas fa-home mr-1"></i>메인
        </button>
        <button onclick="showMenuRegistration()" class="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition-colors text-sm">
          <i class="fas fa-plus mr-1"></i>메뉴 등록
        </button>
      </nav>
    </div>
  </div>
</header>

<!-- 메인 콘텐츠 -->
<main class="container mx-auto px-4 py-8">

  <!-- 대시보드 -->
  <section id="dashboard-section">
    <div class="mb-8">
      <h2 class="text-3xl font-bold text-gray-800 mb-2">실시간 주문 현황판</h2>
      <p class="text-gray-600">친구들의 특별한 칭찬 메뉴를 확인해보세요!</p>
    </div>
    <div id="menu-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div class="col-span-full text-center py-12 text-gray-400">
        <i class="fas fa-spinner fa-spin text-3xl mb-3 block"></i>불러오는 중...
      </div>
    </div>
  </section>

  <!-- 메뉴 등록 -->
  <section id="registration-section" class="hidden">
    <div class="max-w-2xl mx-auto">
      <div class="bg-white rounded-xl shadow-lg p-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">🍳 새로운 칭찬 메뉴 등록하기</h2>
        <form id="menu-form" class="space-y-5" onsubmit="handleMenuSubmit(event)">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"><i class="fas fa-user mr-1"></i>셰프 이름 (작성자)</label>
            <input type="text" id="chef-name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"><i class="fas fa-user-friends mr-1"></i>추천 대상 (칭찬받을 친구)</label>
            <input type="text" id="target-name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"><i class="fas fa-utensils mr-1"></i>칭찬 메뉴명 (요리 이름)</label>
            <input type="text" id="menu-name" required placeholder="예: 우정의 김치찌개" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"><i class="fas fa-seedling mr-1"></i>주재료 (친구의 장점 키워드)</label>
            <input type="text" id="ingredients" required placeholder="예) #배려 #초긍정 #친절 #성실" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"><i class="fas fa-clipboard-list mr-1"></i>메뉴 상세 설명 (칭찬 이유)</label>
            <textarea id="description" rows="4" required placeholder="이 친구가 특별한 이유를 자세히 적어주세요!" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              <i class="fas fa-image mr-1"></i>요리 이미지 선택
              <span class="text-xs text-blue-400 ml-1">(클릭하면 선택돼요!)</span>
            </label>
            <div class="grid grid-cols-4 gap-3">
              <div class="food-image-option" data-image="🍕"><span class="text-4xl">🍕</span></div>
              <div class="food-image-option" data-image="🍜"><span class="text-4xl">🍜</span></div>
              <div class="food-image-option" data-image="🍔"><span class="text-4xl">🍔</span></div>
              <div class="food-image-option" data-image="🥗"><span class="text-4xl">🥗</span></div>
              <div class="food-image-option" data-image="🍰"><span class="text-4xl">🍰</span></div>
              <div class="food-image-option" data-image="🍱"><span class="text-4xl">🍱</span></div>
              <div class="food-image-option" data-image="🥘"><span class="text-4xl">🥘</span></div>
              <div class="food-image-option" data-image="🍙"><span class="text-4xl">🍙</span></div>
              <div class="food-image-option" data-image="🍣"><span class="text-4xl">🍣</span></div>
              <div class="food-image-option" data-image="🍛"><span class="text-4xl">🍛</span></div>
              <div class="food-image-option" data-image="🥪"><span class="text-4xl">🥪</span></div>
              <div class="food-image-option" data-image="🌮"><span class="text-4xl">🌮</span></div>
              <div class="food-image-option" data-image="🍦"><span class="text-4xl">🍦</span></div>
              <div class="food-image-option" data-image="🍩"><span class="text-4xl">🍩</span></div>
              <div class="food-image-option" data-image="🥞"><span class="text-4xl">🥞</span></div>
              <div class="food-image-option" data-image="🍲"><span class="text-4xl">🍲</span></div>
              <div class="food-image-option" data-image="🍚"><span class="text-4xl">🍚</span></div>
              <div class="food-image-option" data-image="🥩"><span class="text-4xl">🥩</span></div>
              <div class="food-image-option" data-image="🍢"><span class="text-4xl">🍢</span></div>
              <div class="food-image-option" data-image="🌭"><span class="text-4xl">🌭</span></div>
              <div class="food-image-option" data-image="🍟"><span class="text-4xl">🍟</span></div>
              <div class="food-image-option" data-image="🍗"><span class="text-4xl">🍗</span></div>
              <div class="food-image-option" data-image="🥓"><span class="text-4xl">🥓</span></div>
              <div class="food-image-option" data-image="🍖"><span class="text-4xl">🍖</span></div>
              <div class="food-image-option" data-image="🍡"><span class="text-4xl">🍡</span></div>
            </div>
            <p class="text-xs text-gray-400 mt-2">선택된 이미지: <span id="selected-image-preview">없음 (선택해주세요)</span></p>
            <input type="hidden" id="selected-image" value="">
          </div>
          <button type="submit" id="submit-btn" class="w-full bg-blue-500 text-white py-3 rounded-lg hover:bg-blue-600 transition-colors font-medium">
            <i class="fas fa-paper-plane mr-2"></i>메뉴 등록하기
          </button>
        </form>
      </div>
    </div>
  </section>
</main>

<!-- 리뷰 작성 모달 -->
<div id="review-modal" class="fixed inset-0 bg-black bg-opacity-50 items-center justify-center z-40" style="display:none;">
  <div class="bg-white rounded-xl p-8 max-w-md w-full mx-4">
    <h3 class="text-xl font-bold text-gray-800 mb-4">✏️ 리뷰 작성하기</h3>
    <form id="review-form" class="space-y-4" onsubmit="handleReviewSubmit(event)">
      <input type="hidden" id="review-menu-id">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">내 이름</label>
        <input type="text" id="reviewer-name" required placeholder="이름을 입력해주세요"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">별점을 선택해주세요</label>
        <div class="flex space-x-1">
          <button type="button" class="star-btn" data-rating="1">⭐</button>
          <button type="button" class="star-btn" data-rating="2">⭐</button>
          <button type="button" class="star-btn" data-rating="3">⭐</button>
          <button type="button" class="star-btn" data-rating="4">⭐</button>
          <button type="button" class="star-btn" data-rating="5">⭐</button>
        </div>
        <p class="text-xs text-gray-400 mt-1" id="rating-text">아직 선택 안 함</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">리뷰 내용</label>
        <textarea id="review-content" rows="3" placeholder="칭찬 메뉴를 맛본 느낌을 써주세요!"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
      </div>
      <div class="flex space-x-3">
        <button type="submit" id="review-submit-btn" class="flex-1 bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition-colors">등록</button>
        <button type="button" onclick="closeReviewModal()" class="flex-1 bg-gray-300 text-gray-700 py-2 rounded-lg hover:bg-gray-400 transition-colors">취소</button>
      </div>
    </form>
  </div>
</div>

<!-- 리뷰 목록 모달 -->
<div id="reviews-modal" class="fixed inset-0 bg-black bg-opacity-50 items-center justify-center z-40" style="display:none;">
  <div class="bg-white rounded-xl p-8 max-w-lg w-full mx-4" style="max-height:80vh;display:flex;flex-direction:column;">
    <div class="flex items-center justify-between mb-3">
      <h3 class="text-xl font-bold text-gray-800">💬 리뷰 목록</h3>
      <button onclick="closeReviewsModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
    </div>
    <p id="reviews-menu-title" class="text-sm text-blue-600 font-medium mb-4"></p>
    <div id="reviews-list" class="overflow-y-auto flex-1 pr-1 space-y-3"></div>
    <button onclick="closeReviewsModal()" class="mt-4 w-full bg-gray-100 text-gray-700 py-2 rounded-lg hover:bg-gray-200 transition-colors">닫기</button>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, onSnapshot,
    query, orderBy, getDocs, where
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey:        "AIzaSyCHthnRiQA-mKb1KZDmcfTfKt7oAWrht6w",
    authDomain:    "namsan-b108c.firebaseapp.com",
    projectId:     "namsan-b108c",
    storageBucket: "namsan-b108c.appspot.com",
    messagingSenderId: "",
    appId: ""
  });
  const db = getFirestore(app);

  // 실시간 메뉴 구독
  const menusQ = query(collection(db, 'menus'), orderBy('created_at', 'desc'));
  let firstLoad = true;
  onSnapshot(menusQ, snapshot => {
    const menus = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    window.displayMenus(menus);
    if (!firstLoad) {
      snapshot.docChanges().forEach(ch => {
        if (ch.type === 'added') {
          const m = ch.doc.data();
          window.showNotification(`딩동! ${m.chef_name} 셰프님의 신메뉴가 등록되었습니다!`);
          window.playNotificationSound();
        }
      });
    }
    firstLoad = false;
  }, err => {
    document.getElementById('menu-grid').innerHTML =
      `<div class="col-span-full text-center py-12 text-red-400">
        <i class="fas fa-exclamation-triangle text-3xl mb-3 block"></i>
        Firebase 연결에 실패했습니다.<br>
        <span class="text-sm">${err.message}</span>
      </div>`;
  });

  // 메뉴 등록
  window.handleMenuSubmit = async function(e) {
    e.preventDefault();
    const image = document.getElementById('selected-image').value;
    if (!image) { alert('요리 이미지를 선택해주세요!'); return; }
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>등록 중...';
    try {
      await addDoc(collection(db, 'menus'), {
        chef_name:   document.getElementById('chef-name').value,
        target_name: document.getElementById('target-name').value,
        menu_name:   document.getElementById('menu-name').value,
        ingredients: document.getElementById('ingredients').value,
        description: document.getElementById('description').value,
        image,
        created_at: new Date().toISOString()
      });
      window.playNotificationSound();
      window.showNotification('메뉴가 등록되었습니다! 🎉');
      showDashboard();
    } catch (err) {
      alert('등록 실패!\n\n오류: ' + err.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i>메뉴 등록하기';
    }
  };

  // 리뷰 등록
  window.handleReviewSubmit = async function(e) {
    e.preventDefault();
    if (!window._selectedRating) { alert('별점을 선택해주세요!'); return; }
    const btn = document.getElementById('review-submit-btn');
    btn.disabled = true;
    btn.textContent = '등록 중...';
    try {
      const menuId = document.getElementById('review-menu-id').value;
      await addDoc(collection(db, 'reviews'), {
        menu_id:       menuId,
        reviewer_name: document.getElementById('reviewer-name').value.trim() || '익명',
        rating:        window._selectedRating,
        content:       document.getElementById('review-content').value,
        created_at:    new Date().toISOString()
      });
      window.playNotificationSound();
      window.showNotification('리뷰가 등록되었습니다!');
      closeReviewModal();
      updateReviewCount(menuId);
    } catch (err) {
      alert('리뷰 등록 실패: ' + err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = '등록';
    }
  };

  // 리뷰 개수 업데이트
  async function updateReviewCount(menuId) {
    try {
      const q = query(collection(db, 'reviews'), where('menu_id','==',menuId));
      const snap = await getDocs(q);
      const el = document.getElementById(`review-count-${menuId}`);
      if (el) el.textContent = snap.size;
    } catch(e) {}
  }

  window._loadAllReviewCounts = async function(menuIds) {
    for (const id of menuIds) updateReviewCount(id);
  };

  // 리뷰 목록
  window.openReviewsModal = async function(menuId, menuName) {
    document.getElementById('reviews-modal').style.display = 'flex';
    document.getElementById('reviews-menu-title').textContent = `📌 "${menuName}"의 리뷰`;
    const list = document.getElementById('reviews-list');
    list.innerHTML = '<p class="text-gray-400 text-sm text-center py-6"><i class="fas fa-spinner fa-spin mr-2"></i>불러오는 중...</p>';
    try {
      const q = query(collection(db, 'reviews'), where('menu_id','==',menuId), orderBy('created_at','desc'));
      const snap = await getDocs(q);
      if (snap.empty) {
        list.innerHTML = '<p class="text-gray-400 text-sm text-center py-6">아직 리뷰가 없어요!<br>첫 번째 리뷰를 남겨보세요.</p>';
        return;
      }
      list.innerHTML = snap.docs.map(d => {
        const r = d.data();
        const stars = '⭐'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
        const date = r.created_at ? new Date(r.created_at).toLocaleDateString('ko-KR') : '';
        return `<div class="border-b border-gray-100 pb-3 last:border-0">
          <div class="flex items-center justify-between mb-1">
            <span class="font-medium text-gray-800 text-sm">${r.reviewer_name}</span>
            <span class="text-xs text-gray-400">${date}</span>
          </div>
          <div class="text-sm mb-1">${stars}</div>
          <p class="text-sm text-gray-600">${r.content || ''}</p>
        </div>`;
      }).join('');
    } catch (err) {
      list.innerHTML = `<p class="text-red-400 text-sm text-center py-6">불러오기 실패: ${err.message}</p>`;
    }
  };

  // 메뉴 카드 렌더
  window.displayMenus = function(menus) {
    const grid = document.getElementById('menu-grid');
    if (!grid) return;
    if (!menus.length) {
      grid.innerHTML = `<div class="col-span-full text-center py-12">
        <div class="text-6xl mb-4">🍽️</div>
        <h3 class="text-xl font-medium text-gray-600 mb-2">아직 등록된 칭찬 메뉴가 없어요!</h3>
        <p class="text-gray-500 mb-6">첫 번째 칭찬 메뉴를 등록해보세요.</p>
        <button onclick="showMenuRegistration()" class="px-6 py-3 bg-green-500 text-white rounded-lg hover:bg-green-600 transition-colors">메뉴 등록하기</button>
      </div>`; return;
    }
    grid.innerHTML = menus.map(m => `
      <div class="bg-white rounded-xl shadow-md hover:shadow-lg transition-all duration-300 hover:-translate-y-1 overflow-hidden">
        <div class="p-6">
          <div class="flex items-center space-x-3 mb-4">
            <div class="text-4xl">${m.image || '🍜'}</div>
            <div>
              <h3 class="text-lg font-bold text-gray-800">${m.menu_name}</h3>
              <p class="text-sm text-gray-500">by ${m.chef_name}</p>
            </div>
          </div>
          <p class="text-sm text-gray-700 mb-1"><i class="fas fa-user-check mr-1 text-blue-400"></i>추천 대상: <span class="font-medium">${m.target_name}</span></p>
          <p class="text-sm text-gray-600 mb-3">${m.description}</p>
          <div class="flex flex-wrap gap-1 mb-4">
            ${m.ingredients ? m.ingredients.split(' ').map(i=>`<span class="px-2 py-0.5 bg-blue-100 text-blue-700 text-xs rounded-full">${i}</span>`).join('') : ''}
          </div>
          <div class="flex gap-2 items-center">
            <button onclick="openReviewModal('${m.id}','${m.menu_name.replace(/'/g,"\\'")}')"
                    class="flex items-center gap-1 px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors text-sm">
              <i class="fas fa-star"></i> 리뷰 쓰기
            </button>
            <button onclick="openReviewsModal('${m.id}','${m.menu_name.replace(/'/g,"\\'")}')"
                    class="flex items-center gap-1 px-4 py-2 bg-indigo-100 text-indigo-700 rounded-lg hover:bg-indigo-200 transition-colors text-sm">
              <i class="fas fa-comment-dots"></i> 리뷰 보기
              <span id="review-count-${m.id}" class="bg-indigo-400 text-white text-xs font-bold px-1.5 py-0.5 rounded-full min-w-[18px] text-center">-</span>
            </button>
          </div>
        </div>
      </div>`).join('');
    if (window._loadAllReviewCounts) window._loadAllReviewCounts(menus.map(m => m.id));
  };
</script>

<!-- 일반 JS -->
<script>
  window._selectedRating = 0;

  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.food-image-option').forEach(opt => {
      opt.addEventListener('click', function() {
        document.querySelectorAll('.food-image-option').forEach(o => o.classList.remove('selected'));
        this.classList.add('selected');
        document.getElementById('selected-image').value = this.dataset.image;
        document.getElementById('selected-image-preview').textContent = this.dataset.image;
      });
    });

    document.querySelectorAll('.star-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        window._selectedRating = parseInt(this.dataset.rating);
        updateStarDisplay();
      });
      btn.addEventListener('mouseenter', function() {
        const h = parseInt(this.dataset.rating);
        document.querySelectorAll('.star-btn').forEach((b,i) => {
          b.style.filter = i < h ? 'grayscale(0) opacity(1)' : 'grayscale(1) opacity(0.35)';
        });
      });
      btn.addEventListener('mouseleave', updateStarDisplay);
    });
  });

  function updateStarDisplay() {
    const r = window._selectedRating;
    const labels = ['아직 선택 안 함','⭐ 1점','⭐⭐ 2점','⭐⭐⭐ 3점','⭐⭐⭐⭐ 4점','⭐⭐⭐⭐⭐ 5점 만점!'];
    document.querySelectorAll('.star-btn').forEach((b,i) => {
      b.style.filter = i < r ? 'grayscale(0) opacity(1)' : 'grayscale(1) opacity(0.35)';
    });
    const t = document.getElementById('rating-text');
    if (t) t.textContent = labels[r] || labels[0];
  }

  function showDashboard() {
    document.getElementById('dashboard-section').classList.remove('hidden');
    document.getElementById('registration-section').classList.add('hidden');
  }

  function showMenuRegistration() {
    document.getElementById('dashboard-section').classList.add('hidden');
    document.getElementById('registration-section').classList.remove('hidden');
    document.getElementById('menu-form').reset();
    document.getElementById('selected-image').value = '';
    document.getElementById('selected-image-preview').textContent = '없음 (선택해주세요)';
    document.querySelectorAll('.food-image-option').forEach(o => o.classList.remove('selected'));
  }

  function openReviewModal(menuId) {
    window._selectedRating = 0;
    updateStarDisplay();
    document.getElementById('review-menu-id').value = menuId;
    document.getElementById('reviewer-name').value = '';
    document.getElementById('review-content').value = '';
    document.getElementById('review-modal').style.display = 'flex';
  }
  function closeReviewModal() {
    document.getElementById('review-modal').style.display = 'none';
  }
  function closeReviewsModal() {
    document.getElementById('reviews-modal').style.display = 'none';
  }

  window.showNotification = function(msg) {
    const el = document.getElementById('notification');
    document.getElementById('notification-text').textContent = msg;
    el.style.transform = 'translateX(0)';
    setTimeout(() => { el.style.transform = 'translateX(500px)'; }, 3500);
  };

  window.playNotificationSound = function() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [{f:880,s:0,d:0.18},{f:660,s:0.2,d:0.28}].forEach(({f,s,d}) => {
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(f, ctx.currentTime+s);
        gain.gain.setValueAtTime(0, ctx.currentTime+s);
        gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime+s+0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+s+d);
        osc.start(ctx.currentTime+s); osc.stop(ctx.currentTime+s+d+0.05);
      });
    } catch(e) {}
  };
</script>
</body>
</html>
